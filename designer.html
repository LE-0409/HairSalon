<!DOCTYPE html>
<html lang="ko">
<head>

</head>

    </div>
    <button class="topnav__burger" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/>
      </svg>
    </button>
  </div>
</header>

<div class="mobile-sheet" aria-hidden="true">
  <div class="mobile-sheet__panel">
    <div class="mobile-sheet__top">
      <span class="brand"><span class="brand__mark">R</span> Salon&nbsp;Rausch</span>
      <button class="mobile-sheet__close" data-close-sheet aria-label="닫기">×</button>
    </div>
    <a href="designers.html" class="is-active">디자이너</a>
    <a href="reviews.html">후기</a>
    <a href="booking.html">예약하기</a>
    <a href="admin.html">관리자</a>
    <div class="mobile-sheet__cta">
      <a href="booking.html" class="btn btn--primary btn--block">지금 예약하기</a>
    </div>
  </div>
</div>

<main>
  <section class="container container--narrow">

    <p class="muted" style="margin-top:24px; font-size: var(--fs-body-sm);">
      <a href="designers.html" style="text-decoration: underline;">← 디자이너 전체</a>
    </p>

    <div id="designer-detail"></div>

  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__cols">
      <div><h4>예약 & 문의</h4><ul><li>예약하기</li><li>예약 변경 / 취소</li><li>카카오톡 상담</li></ul></div>
      <div><h4>살롱 소개</h4><ul><li>디자이너</li><li>시술 메뉴 & 가격</li><li>후기</li></ul></div>
      <div><h4>Salon Rausch</h4><ul><li>인스타그램</li><li>네이버 플레이스</li><li>커뮤니티</li></ul></div>
    </div>
    <div class="footer__legal">
      <span>© 2026 Salon Rausch</span>
      <span>한국어 (KR) · KRW</span>
    </div>
  </div>
</footer>

<script src="assets/js/common.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/wishlist.js"></script>
<script src="assets/js/designers-data.js"></script>
<script>
  (function () {
    const host = document.getElementById("designer-detail");
    if (!host || !window.DesignerStore) return;

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function param(name) {
      const m = new URLSearchParams(location.search).get(name);
      return m ? m.trim() : "";
    }

    function pickDesigner() {
      const id = param("id");
      if (id) {
        const d = DesignerStore.get(id);
        if (d) return d;
      }
      return DesignerStore.list()[0];
    }

    function render(d) {
      const tags = (d.specialties || []).map((s, i) =>
        `<span class="tag${i === 0 ? " tag--ink" : ""}">${escapeHtml(s)}</span>`
      ).join("");

      const careerList = (d.career || []).map((c) => `<li>· ${escapeHtml(c)}</li>`).join("");
      const eduList = (d.education || []).map((c) => `<li>· ${escapeHtml(c)}</li>`).join("");

      const portfolioPhotos = d.portfolioPhotos || [];
      const portfolioTones = d.portfolioTones || [];
      const portfolio = Array.from({ length: 6 }, (_, i) => {
        const photo = portfolioPhotos[i];
        const tone = portfolioTones[i] || "rose";
        if (photo) {
          return `<div class="has-photo" style="background-image:url('${escapeHtml(photo)}'); background-size:cover; background-position:center;"></div>`;
        }
        return `<div data-tone="${escapeHtml(tone)}"></div>`;
      }).join("");

      const heroPhotoStyle = d.photo
        ? `background-image:url('${escapeHtml(d.photo)}'); background-size:cover; background-position:center;`
        : "";
      const heroInitial = d.photo
        ? ""
        : `<span class="designer-card__initial">${escapeHtml(d.initial)}</span>`;

      document.title = `${d.name}${d.isPrincipal ? " 대표" : ""} — Salon Rausch`;

      host.innerHTML = `
        <div class="detail-hero">
          <div class="detail-hero__photo"${d.photo ? "" : ` data-tone="${escapeHtml(d.tone)}"`} style="${heroPhotoStyle}">
            ${heroInitial}
          </div>
          <div>
            <span class="eyebrow">${escapeHtml(d.eyebrow || d.role || "")}</span>
            <h1>${escapeHtml(d.name)} <span style="font-size:18px; color: var(--color-muted); font-weight:500;">${escapeHtml(d.nameEn || "")}</span></h1>
            <div class="detail-hero__role">${escapeHtml(d.roleSubtitle || "")}</div>

            <div class="detail-hero__stats">
              <div class="stat-block"><strong>${escapeHtml((d.years ?? "") + "년")}</strong><span>경력</span></div>
              <div class="stat-block"><strong>★ ${escapeHtml(Number(d.rating).toFixed(2))}</strong><span>후기 평점</span></div>
              <div class="stat-block"><strong>${escapeHtml(d.reviewCount ?? 0)}</strong><span>후기 수</span></div>
            </div>

            <div class="detail-hero__cta">
              <a href="booking.html?designer=${encodeURIComponent(d.id)}" class="btn btn--primary">이 디자이너에게 예약</a>
              <a href="reviews.html?designer=${encodeURIComponent(d.id)}" class="btn btn--secondary">디자이너 후기 보기</a>
            </div>
          </div>
        </div>

        <section class="profile-section">
          <h3>소개</h3>
          <p>${escapeHtml(d.intro || "")}</p>
        </section>

        <section class="profile-section">
          <h3>전문 시술 분야</h3>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">${tags}</div>
        </section>

        <section class="profile-section">
          <h3>경력</h3>
          <ul>${careerList}</ul>
        </section>

        <section class="profile-section">
          <h3>교육 · 강사 이력</h3>
          <ul>${eduList}</ul>
        </section>

        <section class="profile-section">
          <h3>대표 작품</h3>
          <div class="portfolio-grid">${portfolio}</div>
        </section>

        <section class="profile-section" style="border-bottom: none;">
          <div class="kakao-card" style="margin-top: 16px; background: var(--color-surface-soft);">
            <div class="kakao-icon">예</div>
            <div>
              <h3 style="font-size: var(--fs-display-md); font-weight:700;">지금 ${escapeHtml(d.name)}${d.isPrincipal ? " 대표" : ""} 예약하기</h3>
              <p class="muted" style="font-size: var(--fs-body-sm); margin-top:4px;">
                카카오톡 한 번이면 예약 끝. 예약 하루 전 자동 리마인더를 보내드려요.
              </p>
            </div>
            <a href="booking.html?designer=${encodeURIComponent(d.id)}" class="btn btn--primary">예약하기 →</a>
          </div>
        </section>
      `;
    }

    render(pickDesigner());
  })();
</script>
</body>
</html>
